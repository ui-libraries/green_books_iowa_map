  <script>
    // add mapbox Iowa_1950 tiles

        var basemap = L.tileLayer('https://tile.thunderforest.com/pioneer/{z}/{x}/{y}.png?apikey=dd2dca516d114fd89c0b1403358cbfa8', {

    */

      maxBounds: L.latLngBounds([44, -88.0], [40.0, -99.0]),
      layers: [basemap, overmap1, overmap2, overmap3]

    var baseMaps = {
      "Contemporary": basemap,
      "1960 Road Map": overmap3,
      "1950 Road Map": overmap2,
      "1940 Road Map": overmap1

    // Add a function to call in the icons
    function getIcon(d) {
      return d === "Automotive" ? 'fas fa-car' :
        d === "Beauty Parlors" ? 'fas fa-cut' :
        d === "Drug Stores" ? 'fas fa-prescription-bottle-alt' :
        d === "Garages" ? 'fas fa-warehouse' :
        d === "Hotels" ? 'fas fa-bed' :
        d === "Restaurants" ? 'fas fa-utensils' :
        d === "Service Stations" ? 'fas fa-burn' :
        d === "Tailors" ? 'fas fa-tshirt' :
        d === "Taverns" ? 'fas fa-beer' :
        d === "Tourist Homes" ? 'fas fa-suitcase' :
        'rgba(0,0,0,0.0)'; // supported by Microsoft Edge
    };

    // Add a function to color the markers
    function getColor(d) {
      return d === "Automotive" ? 'purple' :
        d === "Beauty Parlors" ? 'blue' :
        d === "Drug Stores" ? 'red' :
        d === "Garages" ? 'green' :
        d === "Hotels" ? 'green' :
        d === "Restaurants" ? 'yellow' :
        d === "Service Stations" ? 'orange' :
        d === "Tailors" ? 'purple' :
        d === "Taverns" ? 'blue' :
        d === "Tourist Homes" ? 'red' :
        'rgba(0,0,0,0.0)'; // supported by Microsoft Edge
    };

    // add a scale bar
    L.control.scale({
      position: 'bottomright'
    }).addTo(map);

    // load the data asynchronously
    d3.queue()
      .defer(d3.json, 'data/all_amenities.geojson')
      .await(drawMap);

    // define drawMap function
    function drawMap(err, amenities) {

      // send geojsons to drawIcons function
      drawIcons(amenities);

    }; // end drawMap function

    // add a temporal legend in sync with the UI slider
    function createTemporalLegend(currentYear) {

      var temporalLegend = L.control({
        position: 'bottomleft' // place the temporal legend at bottom left corner
      });

      // when added to the map
      temporalLegend.onAdd = function(map) {

        var div = L.DomUtil.get("temporal"); // get the style settings

        // disable the mouse events
        L.DomEvent.disableScrollPropagation(div);
        L.DomEvent.disableClickPropagation(div);

        return div; // return the style settings

      }

      $('#temporal span').html(currentYear); // change grade value to that currently selected by UI slider

      temporalLegend.addTo(map); // add the temporal legend to the map

    }; // end createTemporalLegend function

    // add a UI slider

      // create Leaflet control for the slider
      var sliderControl = L.control({
        position: 'bottomleft',
        follow: true
      });

      // add controls to the slider
      sliderControl.onAdd = function(map) {

        var controls = L.DomUtil.get("slider");

        L.DomEvent.disableScrollPropagation(controls);
        L.DomEvent.disableClickPropagation(controls);

        return controls;

      }

      // add the control to the map
      sliderControl.addTo(map);

      $('.slider')
        .on('input change', function() {
          var currentYear = $(this).val(); // identifies the year selected
          createTemporalLegend(currentYear); // create the temporal legend to show the year selected by the slider
          updateIcons(cars, beauty, drugs, hotels, foods, gastas, tailors, taverns, thomes, garages, currentYear); // update the icons to show according to their year
        });

    }; // End sequenceUI function

              icon: getIcon(feature.properties.Type),
              prefix: 'fa',
              markerColor: getColor(feature.properties.Type),
              iconColor: 'white'
            })
          })
        }
      }).addTo(map);

              markerColor: getColor(feature.properties.Type),

            })

        }

        }

      // create taverns Leaflet GeoJSON layer and style with Awesome Markers

            })

        }

            })

        }
      }).addTo(map);

      var currentYear = $('.slider').val();

      // can I get rid of updateIcons?
      cars.eachLayer(function(layer) {
        if (layer.feature.properties.Year == currentYear) {
          map.addLayer(cars)
        }
      });

      beauty.eachLayer(function(layer) {

        }

      drugs.eachLayer(function(layer) {

      hotels.eachLayer(function(layer) {

        }

        }
      });

        }
      });

      tailors.eachLayer(function(layer) {

        }

      taverns.eachLayer(function(layer) {

      thomes.eachLayer(function(layer) {

      // designate the layers as overlays
      var overlays = {
        "Automobiles": cars,
        "Beauty": beauty,
        "Garages": garages,
        "Gas Stations": gastas,

      var controlLayers = L.control.layers(baseMaps, overlays, {

      sequenceUI(cars, beauty, drugs, hotels, foods, gastas, tailors, taverns, thomes, garages);

    } // end the drawIcons function
