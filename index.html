<html lang='en'>

<head>
  <title>Green Book Amenities, Iowa: 1940-1960</title>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css?family=Cutive+Mono|Merriweather:700|Muli:400,700&display=swap" rel="stylesheet">
  <link href='https://api.mapbox.com/mapbox-assembly/v0.8.0/assembly.min.css' rel='stylesheet'>
  <link href='https://api.mapbox.com/mapbox.js/v3.0.1/mapbox.css' rel='stylesheet'>
  <!--[if lte IE 8]>
      <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.6.2/leaflet.ie.css" />
  <![endif]-->
  <!--for filter button icon support-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.10.2/css/all.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.10.2/css/v4-shims.css">

  <!--leaflet tag filter buttons from: https://github.com/maydemirx/leaflet-tag-filter-button-->
  <link rel="stylesheet" href="css/leaflet-tag-filter-button.css">
  <link rel="stylesheet" href="css/easy-button.css">

  <link rel="stylesheet" href="css/leaflet.extra-markers.min.css">

  <style type="text/css">
    <style>body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }

    /* Add banner to header background */
    header {
      /*background-image: url('images/horserace.png');*/
      position: fixed;
      width: 100%;
      height: 100px;
      background-color: #000000;
      box-shadow: 0px 5px 5px black;
      z-index: 800;
    }

    /* Set and style fonts for text in map */
    h1 {
      font-family: 'Muli', sans-serif;
      font-size: 30px;
      display: inline-block;
      color: #ffff00;
      margin-top: 0.5em;
      margin-bottom: 0.0em;
      margin-left: 0.5em;
      margin-right: 0;
      font-weight: normal;
    }

    h2 {
      font-family: 'Merriweather', serif;
      font-size: 13px;
      display: inline-block;
      color: #f7f4ea;
      margin-top: 0.25em;
      margin-bottom: 0.0em;
      margin-left: 1.25em;
      margin-right: 0;
      font-weight: normal;
    }

    h3 {
      font-family: 'Merriweather', sans-serif;
      font-size: 16px;
      display: block;
      margin-top: 0.0em;
      margin-bottom: 0.0em;
      margin-left: 0;
      margin-right: 0;
      font-weight: normal;
    }

    h4 {
      font-family: 'Muli', sans-serif;
      font-size: 12px;
      display: block;
      margin-top: 0.0em;
      margin-bottom: 0.0em;
      margin-left: 0;
      margin-right: 0;
      font-weight: normal;
    }

    h5 {
      font-size: 10px;
      font-family: 'Cutive Mono', monospace;
      font-style: italic;
      display: inline-block;
      margin-top: 0.0em;
      margin-bottom: 0.0em;
    }

    h6 {
      font-family: 'Merriweather', sans-serif;
      font-size: 16px;
      display: inline-block;
      padding-top: 11px;
      font-weight: normal;
    }

    p {
      font-family: 'Muli', sans-serif;
    }

    b {
      font-family: 'Cutive Mono', monospace;
      display: inline-block;
      margin-top: 0.0em;
      margin-bottom: 0.0em;
    }

    /* Set map parameters */
    #map {
      position: fixed;
      top: 100px;
      bottom: 0px;
      width: 100%;
    }

    #slider {
      position: absolute;
      height: 43px;
      bottom: 0px;
      left: 120px;
      z-index: 1000;
      background-color: #fdf5e6;
      border-radius: 3px;
      box-shadow: 0px 0px 0px 2px rgba(0, 0, 0, 0.3);
    }

    #temporal {
      background-color: #fdf5e6;
    }

    .temporal-legend {
      position: absolute;
      left: 10px;
      height: 41px;
      width: 89px;
      bottom: 1px;
      z-index: 1000;
      background-color: #fdf5e6;
      padding-bottom: 10px;
      padding-left: 5px;
      border-radius: 3px;
      box-shadow: 0px 0px 0px 2px rgba(0, 0, 0, 0.3);
    }

    .temporal-legend div {}

    /* Set background colors for popup windows */
    .leaflet-popup-content-wrapper {
      background-color: #f2eecb;
    }

    .leaflet-popup-tip {
      border-top: 10px solid #f2eecb;
    }

    /* Set background color of layer control */
    .leaflet-control-layers-expanded {
      font-family: 'Muli', sans-serif;
      background-color: #f2eecb;
    }

    /* Set background color of zoom control */
    .leaflet-touch .leaflet-bar a {
      background-color: #f2eecb;
    }
  </style>
</head>

<body>
  <header>
    <h1>Green Book Amenities, Iowa: 1940-1960</h1><br>
    <h2>Map by <a href='https://jebowe3.github.io/Map-Portfolio/' style='color:#f7f4ea;'>Jay Bowen</a>, 2020 | Markers customized with <a href='https://github.com/coryasilva/Leaflet.ExtraMarkers' style='color:#f7f4ea;'>Leaflet Extra Markers</a> and
      <a href='https://github.com/lvoogdt/Leaflet.awesome-markers' style='color:#f7f4ea;'>Leaflet Awesome Markers</a>, based on <a href='https://fontawesome.com/license' style='color:#f7f4ea;'>Font Awesome</a> icons</h2>
  </header>

  <!-- map -->
  <div id="map"></div>

  <!-- ui slider -->
  <div id='slider' class='range w300 round py6 border--gray-light px12 leaflet-control'>
    <input class="slider" />
  </div>
  <!-- end slider -->

  <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
  <script src='https://api.mapbox.com/mapbox.js/v3.2.1/mapbox.js'></script>
  <script src='https://api.mapbox.com/mapbox-assembly/v0.8.0/assembly.js'></script>
  <script src="leaflet_awesome_markers.js"></script>
  <script src="js/leaflet.extra-markers.min.js"></script>

  <script src="js/easy-button.js"></script>
  <script src="js/leaflet-tag-filter-button.js"></script>

  <script>
    // add mapbox Iowa_1950 tiles
    L.mapbox.accessToken = 'pk.eyJ1IjoiamVib3dlMyIsImEiOiJjajY1M3l6bWIxeTQwMndtcXRuN3F4ejFpIn0.aE7P49pqaBKjy2HTOw-tgw'; // enter Mapbox access token

    var basemap = L.mapbox.styleLayer('mapbox://styles/jebowe3/ck6vfzgdu0its1imqxec1qskn');
    /*
        // define the basemap using the thunderforest pioneer map and set minimum and maximum zoom levels
        var basemap = L.tileLayer('https://tile.thunderforest.com/pioneer/{z}/{x}/{y}.png?apikey=dd2dca516d114fd89c0b1403358cbfa8', {
          attribution: '&copy; <a href="http://www.thunderforest.com/">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          apikey: '<dd2dca516d114fd89c0b1403358cbfa8>',
          maxZoom: 16,
          minZoom: 7,
        });
    */
    var overmap1 = L.mapbox.styleLayer('mapbox://styles/jebowe3/ck788bszk0wt91imjbb16iy8l');
    var overmap2 = L.mapbox.styleLayer('mapbox://styles/jebowe3/ck6vbdt990eiy1intt77mioei');
    var overmap3 = L.mapbox.styleLayer('mapbox://styles/jebowe3/ck78dcwh52gq11io2ggxhtqtk');

    // center map on Iowa coordinates and set initial zoom
    var map = L.map('map', {
      maxBounds: L.latLngBounds([44, -88.0], [40.0, -99.0]),
      layers: [basemap, overmap1, overmap2, overmap3]
    }).setView([42, -93], 8);

    var baseMaps = {
      "Contemporary": basemap,
      "1960 Road Map": overmap3,
      "1950 Road Map": overmap2,
      "1940 Road Map": overmap1
    };

    // Add a function to call in the icons
    function getIcon(d) {
      return d === "Automotive" ? 'fas fa-car' :
        d === "Beauty Parlors" ? 'fas fa-cut' :
        d === "Drug Stores" ? 'fas fa-prescription-bottle-alt' :
        d === "Garages" ? 'fas fa-warehouse' :
        d === "Hotels" ? 'fas fa-bed' :
        d === "Restaurants" ? 'fas fa-utensils' :
        d === "Service Stations" ? 'fas fa-burn' :
        d === "Tailors" ? 'fas fa-tshirt' :
        d === "Taverns" ? 'fas fa-beer' :
        d === "Tourist Homes" ? 'fas fa-suitcase' :
        'rgba(0,0,0,0.0)'; // supported by Microsoft Edge
    };

    // Add a function to color the markers
    function getColor(d) {
      return d === "Automotive" ? 'purple' :
        d === "Beauty Parlors" ? 'blue' :
        d === "Drug Stores" ? 'red' :
        d === "Garages" ? 'green' :
        d === "Hotels" ? 'green' :
        d === "Restaurants" ? 'yellow' :
        d === "Service Stations" ? 'orange' :
        d === "Tailors" ? 'purple' :
        d === "Taverns" ? 'blue' :
        d === "Tourist Homes" ? 'red' :
        'rgba(0,0,0,0.0)'; // supported by Microsoft Edge
    };

    // add a scale bar
    L.control.scale({
      position: 'bottomright'
    }).addTo(map);

    $.getJSON("data/all_amenities.geojson")
      .done(function(data) {
        var info = processData(data);
        createIcons(info.timestamps, data);
        sequenceUI(info.timestamps);
      })
      .fail(function() {
        alert("There has been a problem loading the data.")
      });

    // define processData function
    function processData(data) {
      var unsortedTimestamps = [];
      var min = Infinity;
      var max = -Infinity;

      for (var feature in data.features) {

        var properties = data.features[feature].properties;

        for (var attribute in properties) {

          if (attribute != 'City' &&
            attribute != 'Type' &&
            attribute != 'Name' &&
            attribute != 'Address' &&
            attribute != 'GeoADD' &&
            attribute != 'COORD' &&
            attribute != 'COORD_X' &&
            attribute != 'COORD_Y' &&
            attribute != 'Notes' &&
            attribute != 'LAT' &&
            attribute != 'LONG' &&
            attribute != 'layer' &&
            attribute != 'path') {

            if ($.inArray(properties[attribute], unsortedTimestamps) === -1) {
              unsortedTimestamps.push(properties[attribute]);
            }

            if (properties[attribute] < min) {
              min = properties[attribute];
            }

            if (properties[attribute] > max) {
              max = properties[attribute];
            }
          }
        }
      }
      return {
        timestamps: unsortedTimestamps.sort(function(a, b) {
          return a - b
        }),
        min: min,
        max: max
      }
    } // end processData

    // define createIcons function
    function createIcons(timestamps, data) {

      // define amenities icons
      amenities = L.geoJson(data, {

        pointToLayer: function(feature, ll) {

          //define an empty array into which you can add tags for the filter buttons
          var tags = [];

          //push properties into the tags array for later referencing by the filter buttons
          tags.push(feature.properties.Type);

          return L.marker(ll, {
            tags: tags,
            icon: L.ExtraMarkers.icon({
              icon: getIcon(feature.properties.Type),
              prefix: 'fa',
              markerColor: getColor(feature.properties.Type),
              iconColor: 'white'
            })
          })

        }

      }).addTo(map);

      // all done with the layers, add them to layer control
      var controlLayers = L.control.layers(baseMaps, null, {
        collapsed: false,
      }).addTo(map);

      // amenity type
      L.control.tagFilterButton({
        data: ["Automotive", "Beauty Parlors", "Drug Stores", "Garages", "Hotels", "Restaurants", "Service Stations", "Tailors", "Taverns", "Tourist Homes"],
        filterOnEveryClick: true,
        icon: '<i class="fas fa-filter" style="font-size:18px; padding-top: 6px;"></i>',
      }).addTo(map);

      jQuery('.easy-button-button').click(function() {
        target = jQuery('.easy-button-button').not(this);
        target.parent().find('.tag-filter-tags-container').css({
          'display': 'none',
        });
      });

      //disable dragging of the map after clicking a filter button
      jQuery('.easy-button-button').click(function() {
        map.dragging.disable();
      });

      //enable dragging of the map after clicking on the map
      map.on('click', function() {
        map.dragging.enable();
      });

      // call updateIcons function
      updateIcons(timestamps[0]);

      // call retrieveIconInfo function
      retrieveIconInfo(amenities);

    } // end createIcons function

    // define updateIcons function
    function updateIcons(timestamp) {

      amenities.eachLayer(function(layer) {

        var def = layer.feature.properties.Year;

        if (def == timestamp) {
          map.addLayer(layer)
        } else {
          map.removeLayer(layer)
        }

      });

    } // end updateIcons function

    // add a UI slider
    function sequenceUI(timestamps) {

      // create Leaflet control for the slider
      var sliderControl = L.control({
        position: 'bottomleft',
        follow: true
      });

      // add controls to the slider
      sliderControl.onAdd = function(map) {

        var controls = L.DomUtil.get("slider");

        L.DomEvent.disableScrollPropagation(controls);
        L.DomEvent.disableClickPropagation(controls);

        return controls;

      }

      // add the control to the map
      sliderControl.addTo(map);

      $('.slider')
        .attr({
          'type': 'range',
          'max': timestamps[timestamps.length - 1],
          'min': timestamps[0],
          'step': 10,
          'value': String(timestamps[0])
        })
        .on('input change', function() {
          updateIcons($(this).val().toString()); // update the icons to show according to their year
          $(".temporal-legend").html('<h6>Year: ' + this.value + '</h6>');
        });

      createTemporalLegend(timestamps[0]);

    }; // end sequenceUI function

    // add a temporal legend in sync with the UI slider
    function createTemporalLegend(startTimestamp) {

      var temporalLegend = L.control({
        position: 'bottomleft' // place the temporal legend at bottom left corner
      });

      temporalLegend.onAdd = function(map) {
        var output = L.DomUtil.create("div", "temporal-legend");
        $(output).html('<h6>Year: ' + startTimestamp + '</h6>');
        return output;
      }

      temporalLegend.addTo(map);

    }; // end createTemporalLegend function


    // define retrieveIconInfo function
    function retrieveIconInfo(amenities) {

      // add content to popup window using the books Leaflet GeoJSON layer properties
      amenities.eachLayer(function(layer) {
        var props = layer.feature.properties;
        layer.bindPopup("<h3>" + props.Year + " Green Book" + "<br>" + props.Name + "</h3>" +
          "<h4>Amenity: " + props.Type +
          "<br>Address: " + props.Address + ", " + props.City + "</h4>" // add website
        );
        layer.on('mouseover', function(e) {
          this.openPopup();
        });
        /*
        layer.on('mouseout', function(e) {
          this.closePopup();
        })
        */
      });

    } // end retrieveIconInfo function
  </script>
</body>

</html>
